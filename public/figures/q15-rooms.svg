<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <style>
    text { font-family: sans-serif; font-size: 16px; fill: #4a3d65; font-weight: bold; }
    .floor { font-size: 11px; fill: #7a6aa0; font-weight: normal; }
    rect { fill: #f0ebfa; stroke: #b8a8d0; stroke-width: 2; rx: 6; }
  </style>
  <!-- 2F -->
  <text class="floor" x="10" y="50">2F</text>
  <rect x="50" y="20" width="80" height="50"/>
  <text x="72" y="52">201</text>
  <rect x="140" y="20" width="80" height="50"/>
  <text x="162" y="52">202</text>
  <rect x="230" y="20" width="80" height="50"/>
  <text x="252" y="52">203</text>

  <!-- 1F -->
  <text class="floor" x="10" y="120">1F</text>
  <rect x="50" y="90" width="80" height="50"/>
  <text x="72" y="122">101</text>
  <rect x="140" y="90" width="80" height="50"/>
  <text x="162" y="122">102</text>
  <rect x="230" y="90" width="80" height="50"/>
  <text x="252" y="122">103</text>
</svg>

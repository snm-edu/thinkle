<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" width="260" height="260">
  <style>
    text { font-family: sans-serif; font-size: 14px; fill: #4a3d65; font-weight: bold; }
    .seat { fill: #f0ebfa; stroke: #b8a8d0; stroke-width: 2; }
  </style>
  <!-- Table circle -->
  <circle cx="130" cy="130" r="60" fill="#d8cef0" fill-opacity="0.3" stroke="#b8a8d0" stroke-width="1.5"/>

  <!-- 6 seats around the table (60 degree intervals) -->
  <!-- Seat 1: top (0 deg from top) -->
  <circle class="seat" cx="130" cy="35" r="24"/>
  <text x="124" y="40" style="fill:#d4986a;">?</text>

  <!-- Seat 2: top-right (60 deg) -->
  <circle class="seat" cx="212" cy="82" r="24"/>
  <text x="206" y="87" style="fill:#d4986a;">?</text>

  <!-- Seat 3: bottom-right (120 deg) -->
  <circle class="seat" cx="212" cy="178" r="24"/>
  <text x="206" y="183" style="fill:#d4986a;">?</text>

  <!-- Seat 4: bottom (180 deg) -->
  <circle class="seat" cx="130" cy="225" r="24"/>
  <text x="124" y="230" style="fill:#d4986a;">?</text>

  <!-- Seat 5: bottom-left (240 deg) -->
  <circle class="seat" cx="48" cy="178" r="24"/>
  <text x="42" y="183" style="fill:#d4986a;">?</text>

  <!-- Seat 6: top-left (300 deg) -->
  <circle class="seat" cx="48" cy="82" r="24"/>
  <text x="42" y="87" style="fill:#d4986a;">?</text>

  <!-- Center text -->
  <text x="110" y="134" style="font-size:12px; fill:#7a6aa0; font-weight:normal;">円卓</text>
</svg>
